name: Test Action
on:
  pull_request: null
jobs:
  test-action:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run Coverage Report Action
      uses: ./
      with:
        github-token: fake-token
        title: Integration Test Report
        cobertura-path: ./test/assets/cobertura-coverage.xml
        show-junit: 'false'
        show-diffcover: 'false'
        min-coverage-percentage: '0'
        fail-under-coverage-percentage: 'false'
        override-comment: 'false'
